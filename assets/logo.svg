<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="El Palmar Mariscos + Sushi">
  <!-- Circle outline -->
  <circle cx="120" cy="88" r="72" fill="none" stroke="#1C2632" stroke-width="2.5"/>

  <!-- Ocean waves inside circle -->
  <clipPath id="circleClip">
    <circle cx="120" cy="88" r="70"/>
  </clipPath>
  <g clip-path="url(#circleClip)">
    <!-- Deep wave fill -->
    <path d="M48 100 Q70 85 92 100 Q114 115 136 100 Q158 85 180 100 L190 160 L50 160 Z" fill="#3DC8E8" opacity="0.75"/>
    <!-- Top wave -->
    <path d="M48 90 Q70 74 92 90 Q114 106 136 90 Q158 74 180 90 Q190 98 192 104 Q170 92 148 108 Q126 120 104 104 Q82 92 60 108 Z" fill="#3DC8E8" opacity="0.45"/>
    <!-- White foam line -->
    <path d="M48 95 Q70 79 92 95 Q114 111 136 95 Q158 79 180 95" fill="none" stroke="white" stroke-width="1.5" opacity="0.60"/>
  </g>

  <!-- Orange sun / shell -->
  <circle cx="120" cy="82" r="18" fill="#F7941D"/>
  <!-- Shell lines -->
  <g stroke="white" stroke-width="1.2" opacity="0.70">
    <line x1="120" y1="66" x2="120" y2="98"/>
    <line x1="107" y1="73" x2="133" y2="91"/>
    <line x1="107" y1="91" x2="133" y2="73"/>
  </g>

  <!-- Palm tree -->
  <!-- Trunk -->
  <path d="M170 55 C166 62 163 72 162 82 C161 90 162 96 162 100 L166 100 C167 96 167 90 167 82 C168 72 170 62 174 55 Z" fill="#1C2632"/>
  <!-- Leaves -->
  <path d="M164 60 C154 48 142 44 136 48 C132 50 132 54 136 56 C142 60 152 58 162 66 Z" fill="#1C2632"/>
  <path d="M165 57 C168 43 178 36 184 38 C188 40 186 44 182 46 C176 50 168 52 166 62 Z" fill="#1C2632"/>
  <path d="M163 62 C150 55 140 58 138 63 C137 67 140 69 145 68 C152 66 160 62 164 68 Z" fill="#1C2632"/>
  <path d="M166 59 C172 46 182 42 187 45 C190 47 188 51 184 52 C178 54 170 54 167 64 Z" fill="#1C2632"/>
  <!-- Coconuts -->
  <circle cx="165" cy="68" r="4" fill="#C8860A"/>
  <circle cx="170" cy="72" r="3.5" fill="#C8860A"/>

  <!-- Text: El Palmar -->
  <text x="9" y="165" font-family="Poppins, Arial, sans-serif" font-weight="300" font-size="36" letter-spacing="-1" fill="#1C2632">El P</text>
  <!-- "al" in orange -->
  <text x="95" y="165" font-family="Poppins, Arial, sans-serif" font-weight="300" font-size="36" letter-spacing="-1" fill="#F7941D">al</text>
  <text x="126" y="165" font-family="Poppins, Arial, sans-serif" font-weight="300" font-size="36" letter-spacing="-1" fill="#1C2632">mar</text>

  <!-- Tagline -->
  <text x="55" y="185" font-family="Montserrat, Arial, sans-serif" font-weight="300" font-size="12" letter-spacing="2" fill="#1C2632" opacity="0.70">Mariscos + Sushi</text>
</svg>
